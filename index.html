<!DOCTYPE html>
<html>
<head>
    <title>PtMP Planner: Multi-AP mmWave Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; font-family: Arial, sans-serif; height: 100%; width: 100%; display: flex; flex-direction: row; overflow: hidden; }
        #sidebar { width: 380px; min-width: 380px; height: 100%; background: #f8f9fa; display: flex; flex-direction: column; border-right: 1px solid #ccc; z-index: 2; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        #sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        #map { flex-grow: 1; height: 100%; position: relative; z-index: 1; background: #e5e3df; }
        
        h2 { font-size: 16px; margin-top: 0; margin-bottom: 10px; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 13px; }
        input[type="number"], select { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        button { width: 100%; padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-bottom: 8px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .btn-success { background: #28a745; }
        .btn-success:hover { background: #218838; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        
        #logBox { height: 150px; min-height: 150px; flex-shrink: 0; background: #1e1e1e; padding: 10px; font-family: monospace; font-size: 11px; overflow-y: auto; border-top: 2px solid #333; box-sizing: border-box; }
        .log-msg { margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 2px; }
        
        .legend { position: absolute; bottom: 20px; left: 20px; z-index: 999; font-size: 11px; color: #333; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 4px; border: 1px solid #ccc; max-height: 400px; overflow-y: auto;}
        .legend-item { display: flex; align-items: center; margin-bottom: 4px; }
        .legend-color { width: 12px; height: 12px; margin-right: 8px; border: 1px solid #777; border-radius: 2px;}
    </style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-scroll">
        <h2>1. Global Network Specs</h2>
        <div style="display: flex; gap: 5px;">
            <div class="form-group" style="flex: 1;">
                <label>Frequency (GHz)</label>
                <select id="freqSelect">
                    <option value="26" selected>26 GHz</option>
                    <option value="28">28 GHz</option>
                    <option value="31">31 GHz</option>
                    <option value="39">39 GHz</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Channel BW (MHz)</label>
                <select id="channelBw" onchange="updateLegend()">
                    <option value="20">20 MHz</option>
                    <option value="40">40 MHz</option>
                    <option value="60">60 MHz</option>
                    <option value="80" selected>80 MHz</option>
                    <option value="140">140 MHz</option>
                    <option value="160">160 MHz</option>
                    <option value="320">320 MHz</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Availability Target (%)</label>
            <select id="availSelect">
                <option value="99.9">99.9% (~8.7 hrs down/yr)</option>
                <option value="99.95">99.95% (~4.3 hrs down/yr)</option>
                <option value="99.99" selected>99.99% (~52 mins down/yr)</option>
                <option value="99.999">99.999% (~5 mins down/yr)</option>
            </select>
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="form-group" style="flex: 1;">
                <label>CPE Gain (dBi)</label>
                <input type="number" id="cpeGain" value="15">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>CPE Noise Fig (dB)</label>
                <input type="number" id="cpeNf" value="7.0" step="0.5">
            </div>
        </div>
        <div class="form-group">
            <label>Target CPE Height AGL (m)</label>
            <input type="number" id="cpeHeight" value="8">
        </div>

        <h2>2. Sector Geometry (Set before clicking)</h2>
        <div style="display: flex; gap: 5px;">
            <div class="form-group" style="flex: 1;">
                <label>AP Tx Power (dBm)</label>
                <input type="number" id="apTx" value="23">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>AP Gain (dBi)</label>
                <input type="number" id="apGain" value="20">
            </div>
        </div>
        <div class="form-group">
            <label>AP Height AGL (m)</label>
            <input type="number" id="apHeight" value="30">
        </div>
        <div style="display: flex; gap: 5px;">
            <div class="form-group" style="flex: 1;">
                <label>Azimuth (°)</label>
                <input type="number" id="azimuth" value="90">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Beamwidth (°)</label>
                <input type="number" id="beamwidth" value="60">
            </div>
        </div>

        <hr>
        <div id="status">Click map to drop APs/Sectors.</div>
        <div style="display: flex; gap: 5px;">
            <button id="btnCoverage" class="btn-success" onclick="calculateCoverage()" disabled style="flex: 2;">Generate Coverage</button>
            <button id="btnClear" class="btn-danger" onclick="clearMap()" style="flex: 1;">Clear Map</button>
        </div>
    </div>
    
    <div id="logBox">
        <div class="log-msg" style="color: #4caf50;">[System] Multi-AP Viewshed Engine Ready.</div>
    </div>
</div>

<div id="map">
    <div class="legend" id="capLegend">
        </div>
</div>

<script>
    // --- MAP INITIALIZATION ---
    const map = L.map('map').setView([32.095, 34.956], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    setTimeout(() => { map.invalidateSize(); }, 500);

    // --- WI-FI 7 FULL MCS TABLE (0 to 11) ---
    const MCS_TABLE = [
        {mcs: 0,  mod: "BPSK",     snr: 2,  baseCap: 34.03,  color: '#ff0000'},
        {mcs: 1,  mod: "QPSK",     snr: 5,  baseCap: 68.06,  color: '#ff4500'},
        {mcs: 2,  mod: "QPSK",     snr: 8,  baseCap: 102.08, color: '#ff8c00'},
        {mcs: 3,  mod: "16-QAM",   snr: 11, baseCap: 136.11, color: '#ffa500'},
        {mcs: 4,  mod: "16-QAM",   snr: 14, baseCap: 204.17, color: '#ffd700'},
        {mcs: 5,  mod: "64-QAM",   snr: 16, baseCap: 272.22, color: '#ffff00'},
        {mcs: 6,  mod: "64-QAM",   snr: 18, baseCap: 306.25, color: '#adff2f'},
        {mcs: 7,  mod: "64-QAM",   snr: 21, baseCap: 340.28, color: '#7fff00'},
        {mcs: 8,  mod: "256-QAM",  snr: 24, baseCap: 408.33, color: '#00ff00'},
        {mcs: 9,  mod: "256-QAM",  snr: 27, baseCap: 453.70, color: '#00fa9a'},
        {mcs: 10, mod: "1024-QAM", snr: 30, baseCap: 510.42, color: '#00ced1'},
        {mcs: 11, mod: "1024-QAM", snr: 33, baseCap: 567.13, color: '#0000ff'}
    ];

    let aps = []; // Array to hold multiple APs
    let coverageLayers = [];

    // --- DYNAMIC LEGEND & CAPACITY CALCULATOR ---
    function getCapacityForBw(baseCap80, currentBw) {
        return (baseCap80 * (currentBw / 80)).toFixed(1);
    }

    function updateLegend() {
        const bw = parseFloat(document.getElementById('channelBw').value);
        const legendBox = document.getElementById('capLegend');
        legendBox.innerHTML = '<div style="font-weight: bold; margin-bottom: 8px;">Capacity Zones</div>';
        
        [...MCS_TABLE].reverse().forEach(tier => {
            const currentCap = getCapacityForBw(tier.baseCap, bw);
            legendBox.innerHTML += `
                <div class="legend-item">
                    <div class="legend-color" style="background: ${tier.color};"></div>
                    MCS ${tier.mcs} (${tier.mod}) - <b>${currentCap} Mbps</b>
                </div>`;
        });
    }
    
    updateLegend();

    function logMsg(msg, type='info') {
        const logBox = document.getElementById('logBox');
        let color = '#4caf50'; 
        if (type === 'warn') color = '#ffeb3b'; 
        if (type === 'error') color = '#f44336'; 
        logBox.innerHTML += `<div class="log-msg" style="color: ${color}">${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // --- MULTI-AP PLACEMENT LOGIC ---
    map.on('click', function(e) {
        // Read the current settings in the UI at the exact moment of the click
        const az = parseFloat(document.getElementById('azimuth').value);
        const bw = parseFloat(document.getElementById('beamwidth').value);
        const h = parseFloat(document.getElementById('apHeight').value);
        const tx = parseFloat(document.getElementById('apTx').value);
        const gain = parseFloat(document.getElementById('apGain').value);

        let apMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
        
        // Save the snapshot parameters directly into the marker object
        apMarker.settings = {
            azimuth: az,
            beamwidth: bw,
            height: h,
            txPower: tx,
            apGain: gain
        };
        
        apMarker.bindPopup(`<b>Sector ${aps.length + 1}</b><br>Azimuth: ${az}°<br>BW: ${bw}°<br>Height: ${h}m`);
        
        aps.push(apMarker);
        
        document.getElementById('btnCoverage').disabled = false;
        logMsg(`Sector ${aps.length} Placed. (Az: ${az}°, BW: ${bw}°, H: ${h}m)`);
    });

    function clearMap() {
        aps.forEach(ap => map.removeLayer(ap));
        aps = [];
        coverageLayers.forEach(layer => map.removeLayer(layer));
        coverageLayers = [];
        document.getElementById('btnCoverage').disabled = true;
        logMsg("Map cleared.", "warn");
    }

    // --- GIS MATH HELPERS ---
    function getDestination(lat, lon, distanceKm, bearing) {
        const R = 6371; 
        const latRad = lat * Math.PI / 180;
        const lonRad = lon * Math.PI / 180;
        const bearingRad = bearing * Math.PI / 180;

        const outLat = Math.asin(Math.sin(latRad) * Math.cos(distanceKm / R) + Math.cos(latRad) * Math.sin(distanceKm / R) * Math.cos(bearingRad));
        const outLon = lonRad + Math.atan2(Math.sin(bearingRad) * Math.sin(distanceKm / R) * Math.cos(latRad), Math.cos(distanceKm / R) - Math.sin(latRad) * Math.sin(outLat));
        return { lat: outLat * 180 / Math.PI, lng: outLon * 180 / Math.PI };
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // --- LINK BUDGET CALCULATOR (Per AP Snapshot) ---
    function calculateMaxRadii(apSettings) {
        const freq = parseFloat(document.getElementById('freqSelect').value);
        const bw = parseFloat(document.getElementById('channelBw').value);
        const rxGain = parseFloat(document.getElementById('cpeGain').value);
        const nf = parseFloat(document.getElementById('cpeNf').value);
        const avail = parseFloat(document.getElementById('availSelect').value);
        
        const txPower = apSettings.txPower;
        const txGain = apSettings.apGain;
        
        const bwHz = bw * 1e6; 
        const noiseFloor = -174 + (10 * Math.log10(bwHz)) + nf;
        
        // Approximate Rain & Gas Attenuation
        let gamma = 0.01; 
        if (freq === 26) gamma = (avail >= 99.99) ? 6.5 : 2.5;
        if (freq === 28) gamma = (avail >= 99.99) ? 7.0 : 3.0;
        if (freq === 31) gamma = (avail >= 99.99) ? 8.5 : 4.0;
        if (freq === 39) gamma = (avail >= 99.99) ? 12.0 : 6.0;

        let results = [];
        
        MCS_TABLE.forEach(tier => {
            const rxThreshold = noiseFloor + tier.snr;
            let minD = 0.01, maxD = 30.0, bestD = 0.01;
            
            for (let i = 0; i < 30; i++) {
                let midD = (minD + maxD) / 2.0;
                let fspl = 20 * Math.log10(midD) + 20 * Math.log10(freq) + 92.45;
                let rxPower = txPower + txGain + rxGain - (fspl + (gamma * midD));
                
                if (rxPower >= rxThreshold) {
                    bestD = midD;
                    minD = midD;
                } else {
                    maxD = midD;
                }
            }
            results.push({ mcs: tier.mcs, mod: tier.mod, color: tier.color, radiusKm: bestD });
        });
        return results;
    }

    // --- MULTI-AP RADIAL SWEEP VIEWSHED ---
    async function calculateCoverage() {
        if (aps.length === 0) return;
        const btn = document.getElementById('btnCoverage');
        btn.disabled = true;
        btn.innerText = "Processing Sweep...";
        
        coverageLayers.forEach(layer => map.removeLayer(layer));
        coverageLayers = [];

        const hCpe = parseFloat(document.getElementById('cpeHeight').value);
        const K_FACTOR = 1.333;

        // Sequentially process every AP dropped on the map
        for (let apIndex = 0; apIndex < aps.length; apIndex++) {
            let activeAP = aps[apIndex];
            let apLat = activeAP.getLatLng().lat;
            let apLng = activeAP.getLatLng().lng;
            
            // Extract the saved snapshot data for THIS specific AP
            let azimuth = activeAP.settings.azimuth;
            let beamwidth = activeAP.settings.beamwidth;
            let hTower = activeAP.settings.height;
            
            logMsg(`Processing Sector ${apIndex + 1}/${aps.length}...`);

            const radiiTiers = calculateMaxRadii(activeAP.settings);
            const maxRadiusKm = radiiTiers[0].radiusKm; 
            
            let startAngle = azimuth - (beamwidth / 2);
            let endAngle = azimuth + (beamwidth / 2);
            let rayPaths = [];
            const SAMPLES_PER_RAY = 40;
            
            for (let angle = startAngle; angle <= endAngle; angle += 2) {
                let pts = [];
                for (let i = 0; i < SAMPLES_PER_RAY; i++) {
                    let dist = (i / (SAMPLES_PER_RAY - 1)) * maxRadiusKm;
                    if(dist === 0) dist = 0.001; 
                    pts.push(getDestination(apLat, apLng, dist, angle));
                }
                rayPaths.push(pts);
            }

            let flatCoords = rayPaths.flat();
            let elevations = Array(flatCoords.length).fill(0); 
            
            const CHUNK_SIZE = 80;
            for (let i = 0; i < flatCoords.length; i += CHUNK_SIZE) {
                let chunk = flatCoords.slice(i, i + CHUNK_SIZE);
                let lats = chunk.map(c => c.lat.toFixed(5)).join(',');
                let lngs = chunk.map(c => c.lng.toFixed(5)).join(',');
                
                try {
                    let res = await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lngs}`);
                    if (res.status === 200) {
                        let data = await res.json();
                        for(let j=0; j<data.elevation.length; j++) {
                            elevations[i+j] = data.elevation[j];
                        }
                    }
                } catch(e) { console.warn("Elevation fetch failed for chunk."); }
            }

            // Apply Shadow Algorithm for this specific AP
            for (let r = 0; r < rayPaths.length - 1; r++) {
                let currentRay = rayPaths[r];
                let nextRay = rayPaths[r+1];
                
                let thetaMax = -90; 
                let baseElevation = elevations[r * SAMPLES_PER_RAY]; 
                
                for (let i = 1; i < SAMPLES_PER_RAY; i++) {
                    let distKm = getDistance(apLat, apLng, currentRay[i].lat, currentRay[i].lng);
                    let currentElev = elevations[r * SAMPLES_PER_RAY + i];
                    
                    let earthBulge = (distKm * distKm) / (12.75 * K_FACTOR);
                    let dropH = (currentElev + earthBulge) - (baseElevation + hTower);
                    let thetaCurrent = Math.atan2(dropH, distKm * 1000) * (180 / Math.PI);
                    
                    let beamElevAtDist = (baseElevation + hTower) + (Math.tan(thetaMax * Math.PI / 180) * distKm * 1000) - earthBulge;
                    let cpeClearsShadow = (currentElev + hCpe) >= beamElevAtDist;

                    if (thetaCurrent > thetaMax) {
                        thetaMax = thetaCurrent; 
                    }

                    if (cpeClearsShadow) {
                        let assignedColor = null;
                        for (let tier of [...radiiTiers].reverse()) { 
                            if (distKm <= tier.radiusKm) {
                                assignedColor = tier.color;
                                break;
                            }
                        }
                        
                        if (assignedColor) {
                            let p1 = currentRay[i-1];
                            let p2 = currentRay[i];
                            let p3 = nextRay[i];
                            let p4 = nextRay[i-1];
                            
                            let poly = L.polygon([p1, p2, p3, p4], {
                                color: assignedColor, stroke: false, fillOpacity: 0.6
                            }).addTo(map);
                            coverageLayers.push(poly);
                        }
                    }
                }
            }
        } // End AP Loop
        
        logMsg(`Completed coverage sweep for ${aps.length} sectors.`);
        btn.innerText = "Generate Coverage";
        btn.disabled = false;
    }
</script>

</body>
</html>
